<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Counter</title>
   <link rel="stylesheet" href="counter.css">
</head>
<body>
   <div class="container">
      <div class="title-container">
         <h2>Counter</h2>
         <div>Counter application using HTML, CSS, and Javascript</div>
      </div>
      <div class="counter">
         <div id="display"></div>
         <div class="buttons">
            <button type="button" onclick="increase()">Increase</button>
            <button type="button" onclick="reset()">Initialize</button>
            <button type="button" onclick="decrease()">Decrease</button>
         </div>
      </div>
   </div>
   <script src="counter.js"></script>
</body>
</html>
